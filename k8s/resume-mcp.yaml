apiVersion: v1
kind: Namespace
metadata:
  name: resume-mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-mcp-server
  namespace: resume-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resume-mcp-server
  template:
    metadata:
      labels:
        app: resume-mcp-server
    spec:
      containers:
      - name: resume-mcp-server
        image: resume-mcp-server:test
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - secretRef:
            name: resume-mcp-secrets
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - import socket; s=socket.socket(); s.settimeout(1); s.connect(("127.0.0.1", 8000)); s.close()
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - import socket; s=socket.socket(); s.settimeout(1); s.connect(("127.0.0.1", 8000)); s.close()
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: resume-mcp-server
  namespace: resume-mcp
spec:
  selector:
    app: resume-mcp-server
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
