apiVersion: v1
kind: Namespace
metadata:
  name: resume-mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-mcp-server
  namespace: resume-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resume-mcp-server
  template:
    metadata:
      labels:
        app: resume-mcp-server
    spec:
      containers:
      - name: resume-mcp-server
        image: ghcr.io/bugparty/resume-mcp-server:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: FASTMCP_HOST
          value: "0.0.0.0"
        envFrom:
        - secretRef:
            name: resume-mcp-secrets
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - import socket; s=socket.socket(); s.settimeout(1); s.connect(("127.0.0.1", 8000)); s.close()
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - import socket; s=socket.socket(); s.settimeout(1); s.connect(("127.0.0.1", 8000)); s.close()
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: resume-mcp-server
  namespace: resume-mcp
spec:
  selector:
    app: resume-mcp-server
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: resume-mcp-server
  namespace: resume-mcp
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
  - host: resume-mcp.k.0x1f0c.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: resume-mcp-server
            port:
              number: 8000
